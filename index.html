  function render(progress, backlog) {
    var ID_RE = /^V2-\d{3}$/;
    var byId = {};
    (backlog.items || []).forEach(function(it) {
      if (it && it.id && ID_RE.test(it.id)) byId[it.id] = it;
    });
    var s = progress.summary || {};

    var stamp = progress.last_updated || backlog.last_updated || '';
    document.getElementById('updated').textContent = 'Snapshot: ' + stamp + '  ·  baked-in static page';

    var total = s.total_items || 0;
    var shipped = s.shipped || 0;
    var pct = (typeof s.pct_complete === 'number') ? s.pct_complete : (total ? (100*shipped/total) : 0);
    var bar = document.getElementById('overall-bar');
    bar.style.width = Math.max(pct, 5) + '%';
    bar.textContent = shipped + '/' + total + '  (' + pct.toFixed(1) + '%)';
    if (pct === 0) bar.style.background = '#bdbdbd';

    document.getElementById('blocker').textContent = s.biggest_blocker || 'None';

    var next3 = document.getElementById('next3'); next3.innerHTML = '';
    (s.next_3_priority || []).forEach(function(raw) {
      var m = String(raw).match(/^(V2-\d{3})\s+(.+)$/);
      var id = m ? m[1] : null, name = m ? m[2] : String(raw);
      var item = id ? byId[id] : null;
      var card = document.createElement('div'); card.className = 'card';
      var h = '<div class="card-title">' + (id ? id + ' &mdash; ' : '') + esc(name) + '</div>';
      if (item) {
        h += '<div class="card-meta">';
        h += '<span class="status status-' + item.status + '">' + item.status + '</span>';
        h += '<span class="priority priority-' + item.priority + '">' + item.priority + '</span>';
        if (item.complexity_estimate) h += '<span class="priority">' + item.complexity_estimate + '</span>';
        h += '</div>';
        if (item.depends_on && item.depends_on.length) h += '<div class="deps">Depends on: ' + item.depends_on.join(', ') + '</div>';
      }
      card.innerHTML = h; next3.appendChild(card);
    });

    var aw = document.getElementById('awaiting'); aw.innerHTML = '';
    var awIds = s.items_awaiting_hassan || [];
    if (!awIds.length) { aw.innerHTML = '<div class="empty">Nothing awaiting your input</div>'; }
    else {
      var box = document.createElement('div'); box.className = 'awaiting';
      var inner = '<div class="awaiting-title">' + awIds.length + ' item' + (awIds.length===1?'':'s') + ' need your input</div>';
      awIds.forEach(function(id) {
        var it = byId[id];
        if (it) {
          var blk = (it.blockers && it.blockers.length) ? it.blockers[0] : '';
          inner += '<div class="awaiting-row"><b>' + id + '</b> &mdash; ' + esc(it.name||'') +
                   ' <span class="priority priority-' + it.priority + '">' + it.priority + '</span>';
          if (blk) inner += '<div class="deps">' + esc(blk) + '</div>';
          inner += '</div>';
        } else { inner += '<div class="awaiting-row"><b>' + id + '</b></div>'; }
      });
      box.innerHTML = inner; aw.appendChild(box);
    }

    var phDiv = document.getElementById('phases'); phDiv.innerHTML = '';
    (progress.phases || []).forEach(function(ph) {
      var ids = (ph.items || []).filter(function(i){ return ID_RE.test(i); });
      var ship = 0; ids.forEach(function(i){ if ((byId[i]||{}).status === 'SHIPPED') ship++; });
      var p = ids.length ? (100*ship/ids.length) : 0;
      var row = document.createElement('div'); row.className = 'phase-row';
      row.innerHTML =
        '<div style="flex:1;">' +
          '<div class="phase-name">' + esc(ph.name || ph.phase_id) + '</div>' +
          '<div class="phase-mini-bar"><div class="phase-mini-fill" style="width:' + p.toFixed(1) + '%"></div></div>' +
        '</div>' +
        '<span class="phase-stat">' + ship + '/' + ids.length + ' (' + p.toFixed(0) + '%)</span>';
      phDiv.appendChild(row);
    });

    var shipDiv = document.getElementById('shipped'); shipDiv.innerHTML = '';
    var ls = s.last_5_shipped || [];
    if (!ls.length) { shipDiv.innerHTML = '<div class="empty">Nothing shipped yet</div>'; }
    else {
      ls.forEach(function(label) {
        var card = document.createElement('div'); card.className = 'card';
        var m = String(label).match(/^(V2-\d{3})\s*\((\d{4}-\d{2}-\d{2})\)/);
        if (m) {
          var it = byId[m[1]];
          card.innerHTML = '<div class="card-title">' + m[1] + (it ? ' &mdash; ' + esc(it.name) : '') + '</div>' +
                           '<div class="card-meta"><span class="status status-SHIPPED">SHIPPED</span><span>' + m[2] + '</span></div>';
        } else {
          card.innerHTML = '<div class="card-title">' + esc(String(label)) + '</div>';
        }
        shipDiv.appendChild(card);
      });
    }
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
})();
</script>
</body>
</html>
